body:
  text: 孫明復小集别集類二宋提要臣等謹案孫明復小集一卷宋孫復撰復有春秋尊王發微已著録案文獻通考載孫復睢陽子集十卷宋史藝文志亦同此本出自泰安趙國麟家僅文十九篇詩三首蘇轍歐陽修墓碑載修謂於文得尹師魯孫明復而意猶不足蓋宋初承五代之弊文體卑靡穆修柳開始追古格復與尹洙繼之風氣初開菁華未盛故修之言云爾然復之文根柢經術謹嚴峭潔卓然為儒者之言與歐蘇曽王千變萬化務極文章之能事者又别為一格修所言似未可槩執也至於論揚雄過為溢美謂其太元之作非以凖易乃以嫉莽則白圭之玷亦不必為復諱矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b9b585e1ede13b61af740bd917221fec03b503ad55f5e3ea321e7a846e27753c
